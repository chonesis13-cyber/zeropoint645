<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 영점 사격 시스템</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-color: #161824;
            --primary-color: #7b2cbf;
            --primary-hover: #9d4edd;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #ffb703;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 10px 0;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 5px 0 0 0;
        }

        .card {
            background-color: var(--card-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .range-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #0d0e12;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #2d3142;
        }

        .range-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        .range-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .range-inputs input {
            width: 50px;
            background-color: #161824;
            border: 1px solid #3d425c;
            color: white;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .range-inputs span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .btn-extract {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-extract:hover {
            background-color: var(--primary-hover);
        }

        .result-container {
            margin-top: 15px;
            text-align: center;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .ball-container {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .ball {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #ffffff;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.6);
        }

        .btn-save {
            width: 100%;
            background-color: #2a9d8f;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
            display: none;
        }

        .table-wrapper {
            overflow-y: auto;
            max-height: 240px;
            border-radius: 8px;
            border: 1px solid #1f2235;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: center;
        }

        thead th {
            position: sticky;
            top: 0;
            background-color: #1f2235;
            color: var(--text-color);
            font-weight: bold;
            padding: 10px 8px;
            z-index: 1;
        }

        th {
            color: var(--text-muted);
            padding: 8px;
            border-bottom: 1px solid #2d3142;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #1f2235;
            background-color: var(--card-color);
        }

        .badge {
            background-color: #2d3142;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
        }

        .loading-text {
            text-align: center;
            padding: 30px 15px;
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .btn-retry {
            background-color: #2d3142;
            color: white;
            border: 1px solid #3d425c;
            padding: 6px 12px;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .saved-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #0d0e12;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #2d3142;
        }

        .saved-balls {
            display: flex;
            gap: 4px;
        }

        .mini-ball {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
        }

        .item-actions {
            display: flex;
            gap: 6px;
        }

        .btn-item-check {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-delete {
            background-color: #2d3142;
            color: var(--danger-color);
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 15px 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🎯 로또 영점 사격 시스템</h1>
        <p>기밀 유지 알고리즘 구동 중</p>
    </header>

    <div class="card">
        <div class="section-title">🚀 영점 조절 추출기</div>
        <div class="range-container">
            <span class="range-title">🎯 목표 합계 설정</span>
            <div class="range-inputs">
                <input type="number" id="min-sum" value="130">
                <span>~</span>
                <input type="number" id="max-sum" value="145">
            </div>
        </div>
        <button class="btn-extract" onclick="extractNumbers()">AI 번호 추출하기</button>
        <div class="result-container" id="extract-result">
            <span style="color: var(--text-muted);">버튼을 눌러 번호를 추출하세요</span>
        </div>
        <button class="btn-save" id="btn-save-action" onclick="saveCurrentNumbers()">⭐ 이 조합 저장하기</button>
    </div>

    <div class="card">
        <div class="section-title">📊 최근 10주차 추이 분석 (실시간)</div>
        <div class="table-wrapper">
            <table id="lotto-table" style="display: none;">
                <thead>
                    <tr>
                        <th>회차</th>
                        <th>당첨 번호</th>
                        <th>합계</th>
                    </tr>
                </thead>
                <tbody id="lotto-table-body"></tbody>
            </table>
            <div id="table-loading" class="loading-text">📡 동행복권 기밀 저장소 동기화 중...</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title" id="check-section-title">🔍 내 저장 조합 및 당첨 확인</div>
        <div class="saved-list" id="saved-list-container"></div>
        <div id="check-result" style="white-space: pre-line;"></div>
    </div>
</div>

<script>
    let currentExtracted = []; 
    let latestWinningNumbers = []; 
    let latestDrawNo = 1228; 
    const colors = ['#f1c40f', '#3498db', '#e74c3c', '#95a5a6', '#2ecc71'];

    window.onload = function() {
        renderSavedList();
        fetchLatestLottoData(); 
    };

    // 🚀 프록시 서버 안정성 대폭 강화 엔진 (2중 우회 및 타임아웃 예외 제어)
    async function fetchLatestLottoData() {
        const loadingDiv = document.getElementById('table-loading');
        try {
            const baseDate = new Date("2026-06-13T20:45:00");
            const now = new Date();
            const diffMs = now - baseDate;
            const diffWeeks = Math.floor(diffMs / (1000 * 60 * 60 * 24 * 7));
            latestDrawNo = 1228 + (diffWeeks > 0 ? diffWeeks : 0);

            let tableBody = document.getElementById('lotto-table-body');
            tableBody.innerHTML = '';

            // 가장 우회 성공률이 높은 'codetabs' 프록시 통로로 주 전선 교체
            let promises = [];
            for (let i = 0; i < 10; i++) {
                let drawNo = latestDrawNo - i;
                let targetUrl = `https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${drawNo}`;
                // 차단 우회 기능이 더 유연한 타사 프록시 엔드포인트 적용
                let proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;
                
                promises.push(
                    fetch(proxyUrl)
                        .then(res => {
                            if(!res.ok) throw new Error("Network response was not ok");
                            return res.json();
                        })
                        .catch(err => {
                            // 1차 프록시 뻑나면 2차 복구 프록시(allorigins)로 즉시 우회 구동
                            return fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`)
                                    .then(r => r.json())
                                    .then(j => JSON.parse(j.contents));
                        })
                );
            }

            const results = await Promise.all(promises);
            let successCount = 0;
            
            results.forEach((data, index) => {
                if (data && data.returnValue === "success") {
                    successCount++;
                    let drawNum = data.drwNo;
                    let nums = [data.drwtNo1, data.drwtNo2, data.drwtNo3, data.drwtNo4, data.drwtNo5, data.drwtNo6];
                    let sum = nums.reduce((a, b) => a + b, 0);

                    if (index === 0 || latestWinningNumbers.length === 0) {
                        latestWinningNumbers = [...nums];
                        document.getElementById('check-section-title').innerText = `🔍 내 저장 조합 및 당첨 확인 (${drawNum}회 기준)`;
                    }

                    let borderStyle = "border-left: 3px solid #f1c40f;";
                    if (sum <= 129) borderStyle = "border-left: 3px solid #2ecc71;";
                    else if (sum >= 146) borderStyle = "border-left: 3px solid #e74c3c;";

                    let row = `<tr>
                        <td>${drawNum}회</td>
                        <td>${nums.join(', ')}</td>
                        <td><span class="badge" style="${borderStyle}">${sum}</span></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                }
            });

            if(successCount === 0) throw new Error("All proxy failed");

            loadingDiv.style.display = 'none';
            document.getElementById('lotto-table').style.display = 'table';

        } catch (error) {
            console.error("데이터 동기화 실패:", error);
            loadingDiv.innerHTML = `⚠️ 공공 데이터 서버 트래픽 혼잡<br><span style="font-size:0.75rem; color:var(--danger-color)">우회망 지연이 발생했습니다.</span><br><button class="btn-retry" onclick="location.reload()">🎯 다시 조준 (새로고침)</button>`;
        }
    }

    function extractNumbers() {
        let minSum = parseInt(document.getElementById('min-sum').value) || 130;
        let maxSum = parseInt(document.getElementById('max-sum').value) || 145;

        if (minSum > maxSum) {
            let temp = minSum; minSum = maxSum; maxSum = temp;
            document.getElementById('min-sum').value = minSum;
            document.getElementById('max-sum').value = maxSum;
        }

        let attempts = 0;
        while (attempts < 5000) {
            currentExtracted = [];
            while (currentExtracted.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if (!currentExtracted.includes(num)) currentExtracted.push(num);
            }
            let sum = currentExtracted.reduce((a, b) => a + b, 0);
            if (sum >= minSum && sum <= maxSum) break;
            attempts++;
        }

        currentExtracted.sort((a, b) => a - b);
        let finalSum = currentExtracted.reduce((a, b) => a + b, 0);

        let html = '<div class="ball-container">';
        currentExtracted.forEach(num => {
            let colorIdx = Math.floor((num - 1) / 10);
            html += `<div class="ball" style="background-color: ${colors[colorIdx]}">${num}</div>`;
        });
        html += `</div><span style="font-size:0.85rem; color:var(--text-muted);">합계: ${finalSum} (연산: ${attempts + 1}회)</span>`;
        
        document.getElementById('extract-result').innerHTML = html;
        document.getElementById('btn-save-action').style.display = 'block';
    }

    function saveCurrentNumbers() {
        if (currentExtracted.length !== 6) return;
        let saved = JSON.parse(localStorage.getItem('myLottoNumbers')) || [];
        let isDuplicate = saved.some(item => JSON.stringify(item) === JSON.stringify(currentExtracted));
        
        if (isDuplicate) {
            alert("이미 보관함에 들어있는 정예 번호 조합입니다. 🎯");
            return;
        }

        saved.push(currentExtracted);
        localStorage.setItem('myLottoNumbers', JSON.stringify(saved));
        renderSavedList();
        alert("기밀 보관함에 저장을 완료했습니다! 🔒");
    }

    function renderSavedList() {
        let saved = JSON.parse(localStorage.getItem('myLottoNumbers')) || [];
        let container = document.getElementById('saved-list-container');
        
        if (saved.length === 0) {
            container.innerHTML = '<div class="no-data">저장된 기밀 조합이 없습니다. 번호를 추출하여 조합을 세이브해 보세요!</div>';
            return;
        }

        let html = '';
        saved.forEach((set, index) => {
            html += `<div class="saved-item">
                <div class="saved-balls">`;
            set.forEach(num => {
                let colorIdx = Math.floor((num - 1) / 10);
                html += `<div class="mini-ball" style="background-color: ${colors[colorIdx]}">${num}</div>`;
            });
            html += `</div>
                <div class="item-actions">
                    <button class="btn-item-check" onclick="checkSpecificSet(${index})">🎯 확인</button>
                    <button class="btn-delete" onclick="deleteSet(${index})">삭제</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function deleteSet(index) {
        let saved = JSON.parse(localStorage.getItem('myLottoNumbers')) || [];
        saved.splice(index, 1);
        localStorage.setItem('myLottoNumbers', JSON.stringify(saved));
        renderSavedList();
        document.getElementById('check-result').innerText = '';
    }

    function checkSpecificSet(index) {
        let saved = JSON.parse(localStorage.getItem('myLottoNumbers')) || [];
        let targetSet = saved[index];

        let winning = latestWinningNumbers.length === 6 ? latestWinningNumbers : [24, 29, 30, 31, 35, 44];
        let currentCheckDraw = latestWinningNumbers.length === 6 ? latestDrawNo : 1228;

        let matchCount = targetSet.filter(x => winning.includes(x)).length;
        let resultTxt = `[조합 ${index + 1}] 최신 ${currentCheckDraw}회 당첨 확인: ${matchCount}개 일치\n`;
        
        if (matchCount === 6) resultTxt += "🎉 대박!! 1등 명중!! 당장 농협으로 사격 개시!!! 🍾";
        else if (matchCount === 5) resultTxt += "🥳 와! 3등 보너스 구간 등극!! 영점이 거의 일치했습니다!";
        else if (matchCount === 4) resultTxt += "👍 4등 당첨! 탄착군이 좁혀지고 있습니다.";
        else if (matchCount === 3) resultTxt += "🌱 5등 당첨! 본전 확보 완료. 사격 유지하세요!";
        else resultTxt += "🤫 아쉽게 낙첨! 영점 나사를 한 클릭만 조절해 보시죠.";

        document.getElementById('check-result').innerText = resultTxt;
    }
</script>
</body>
</html>
