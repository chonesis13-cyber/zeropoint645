<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 영점 사격 시스템</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-color: #161824;
            --primary-color: #7b2cbf;
            --primary-hover: #9d4edd;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #ffb703;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 10px 0;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 5px 0 0 0;
        }

        .card {
            background-color: var(--card-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 합계 범위 설정 스타일 */
        .range-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #0d0e12;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #2d3142;
        }

        .range-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        .range-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .range-inputs input {
            width: 50px;
            background-color: #161824;
            border: 1px solid #3d425c;
            color: white;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .range-inputs span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* 1단: 번호 추출 */
        .btn-extract {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-extract:hover {
            background-color: var(--primary-hover);
        }

        .result-container {
            margin-top: 15px;
            text-align: center;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .ball-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 8px;
            flex-wrap: wrap; /* 화면 좁으면 공도 자연스럽게 내려가도록 보호 */
        }
